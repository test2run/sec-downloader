<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading {{ ticker }} Filings...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            padding: 20px;
            text-align: center;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 { color: #333; }
        p { color: #666; }
        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #ddd;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 24px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { font-size: 0.95rem; color: #555; margin-top: 16px; }
        .error { color: #dc2626; font-weight: bold; }
        a { color: #2563eb; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Preparing your download&hellip;</h2>
        <p>Fetching SEC filings for <strong>{{ ticker }}</strong>. This may take a minute.</p>
        <div class="spinner" id="spinner"></div>
        <p class="status" id="status-msg">Contacting SEC EDGAR&hellip;</p>
    </div>

    <script>
        const jobId = "{{ job_id }}";
        const statusMsg = document.getElementById("status-msg");
        const spinner = document.getElementById("spinner");

        function poll() {
            fetch("/status/" + jobId)
                .then(r => r.json())
                .then(data => {
                    if (data.status === "done") {
                        statusMsg.textContent = "Download ready! Starting…";
                        spinner.style.borderTopColor = "#16a34a";
                        window.location.href = "/result/" + jobId;
                    } else if (data.status === "error") {
                        spinner.style.display = "none";
                        statusMsg.innerHTML = '<span class="error">Download failed. <a href="/">Try again</a>.</span>';
                    } else {
                        setTimeout(poll, 2000);
                    }
                })
                .catch(() => setTimeout(poll, 3000));
        }

        poll();
    </script>
</body>
</html>
