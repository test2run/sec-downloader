<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEC Filing Downloader</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Aptos", "Aptos Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f6f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
        padding: 40px;
        width: 100%;
        max-width: 520px;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 6px;
      }

      .subtitle {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 32px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 6px;
      }

      .field {
        margin-bottom: 22px;
      }

      input[type="text"],
      input[type="number"],
      select {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 15px;
        color: #111827;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="text"]:focus,
      input[type="number"]:focus,
      select:focus {
        border-color: #0a735e;
        box-shadow: 0 0 0 3px rgba(10, 115, 94, 0.1);
      }

      .checkboxes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        cursor: pointer;
        transition:
          background 0.1s,
          border-color 0.1s;
      }

      .checkbox-item:has(input:checked) {
        background: #e6f4f1;
        border-color: #0a735e;
      }

      .checkbox-item input[type="checkbox"] {
        accent-color: #0a735e;
        width: 16px;
        height: 16px;
        cursor: pointer;
      }

      .checkbox-item span {
        font-size: 14px;
        font-weight: 500;
        color: #374151;
      }

      .checkbox-item small {
        font-size: 11px;
        color: #9ca3af;
        display: block;
      }

      button[type="submit"] {
        width: 100%;
        padding: 12px;
        background: #0a735e;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        margin-top: 8px;
      }

      button[type="submit"]:hover {
        background: #085f4d;
      }
      button[type="submit"]:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }

      .loading {
        display: none;
        margin-top: 20px;
        font-size: 13px;
        color: #6b7280;
        text-align: center;
      }

      .progress-track {
        width: 100%;
        height: 8px;
        background: #e5e7eb;
        border-radius: 99px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #0a735e, #12a688);
        border-radius: 99px;
        transition: width 0.4s ease;
      }

      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        padding: 12px 14px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 20px;
      }

      .hint {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>SEC Filing Downloader</h1>
      <p class="subtitle">
        Download SEC filings as a zip file. Files open in any browser.
      </p>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/download" id="dlForm">
        <div class="field">
          <label for="ticker">Stock Ticker</label>
          <input
            type="text"
            id="ticker"
            name="ticker"
            placeholder="e.g. AAPL, MSFT, NVDA"
            value="{{ request.form.get('ticker', '') }}"
            autocomplete="off"
            required
          />
          <p class="hint">
            US stocks only. Use the ticker symbol, not the company name.
          </p>
        </div>

        <div class="field">
          <label>Filing Types</label>
          <div class="checkboxes">
            <label class="checkbox-item">
              <input type="checkbox" name="forms" value="10-K" checked />
              <div><span>10-K</span><small>Annual Report</small></div>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="forms" value="10-Q" checked />
              <div><span>10-Q</span><small>Quarterly Report</small></div>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="forms" value="8-K" />
              <div><span>8-K</span><small>Current Report</small></div>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="forms" value="DEF 14A" />
              <div><span>DEF 14A</span><small>Proxy Statement</small></div>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="forms" value="S-1" />
              <div><span>S-1</span><small>IPO Registration</small></div>
            </label>
          </div>
        </div>

        <div class="field">
          <label for="years">Years of History</label>
          <input type="number" id="years" name="years" value="10" min="1" max="20" step="1"
            oninput="this.value = Math.min(20, Math.max(1, Math.round(this.value) || 1))" />
          <p class="hint">More years = longer download time.</p>
        </div>

        <div class="field">
          <label class="checkbox-item" style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;font-weight:normal;cursor:pointer;">
            <input type="checkbox" name="convert_pdf" value="1" id="convertPdf"
              style="accent-color:#0a735e;width:16px;height:16px;margin-top:2px;flex-shrink:0;cursor:pointer;" />
            <div>
              <span style="font-size:14px;font-weight:600;color:#374151;">Convert to PDF</span>
              <p class="hint" style="margin-top:4px;">&#9888;&#65039; PDF conversion takes considerably longer &mdash; typically 5&ndash;15 seconds per filing. A request for 10 years of filings across multiple form types may take several minutes. Leave unchecked for fast HTML download.</p>
            </div>
          </label>
        </div>

        <button type="submit" id="submitBtn">Download ZIP</button>

        <div class="loading" id="loadingMsg">
          <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <span id="progressLabel">Preparing download...</span>
        </div>
      </form>
    </div>

    <script>
      document.getElementById("dlForm").addEventListener("submit", function () {
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("submitBtn").textContent = "Downloading...";
        document.getElementById("loadingMsg").style.display = "block";

        var bar = document.getElementById("progressBar");
        var label = document.getElementById("progressLabel");
        var pct = 0;

        var messages = [
          "Fetching filing list...",
          "Downloading filings...",
          "Packaging files...",
          "Almost there...",
        ];

        var interval = setInterval(function () {
          // Slow down as we approach 90% so it never hits 100 before finishing
          var step = pct < 40 ? 3 : pct < 70 ? 1.5 : pct < 88 ? 0.5 : 0;
          pct = Math.min(pct + step, 90);
          bar.style.width = pct + "%";
          label.textContent = messages[Math.min(Math.floor(pct / 25), messages.length - 1)];
          if (pct >= 90) clearInterval(interval);
        }, 500);
      });
    </script>
  </body>
</html>
