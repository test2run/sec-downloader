<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEC Filing Downloader — Processing</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f6f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
        padding: 40px;
        width: 100%;
        max-width: 520px;
        text-align: center;
      }
      h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
      .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
      .progress-track {
        width: 100%;
        height: 8px;
        background: #e5e7eb;
        border-radius: 99px;
        overflow: hidden;
        margin-bottom: 12px;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4f46e5, #818cf8);
        border-radius: 99px;
        transition: width 0.4s ease;
      }
      #statusMsg { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        background: #4f46e5;
        color: white;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.15s;
      }
      .btn:hover { background: #4338ca; }
      #doneSection { display: none; }
      .success-msg { font-size: 15px; color: #16a34a; font-weight: 600; margin-bottom: 20px; }
      .another-link { display: block; margin-top: 16px; font-size: 13px; color: #6b7280; text-decoration: none; }
      .another-link:hover { color: #374151; }
      .error-msg { font-size: 14px; color: #dc2626; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Downloading {{ ticker }} filings</h1>
      <p class="subtitle">Please keep this page open. This may take a few minutes.</p>

      <div id="progressSection">
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="statusMsg">Fetching filing list...</p>
      </div>

      <div id="doneSection">
        <p class="success-msg">Your download is ready!</p>
        <a href="/result/{{ job_id }}" class="btn">Download ZIP</a>
        <a href="/" class="another-link">Download another</a>
      </div>
    </div>

    <script>
      var bar = document.getElementById("progressBar");
      var statusMsg = document.getElementById("statusMsg");
      var pct = 0;
      var messages = ["Fetching filing list...", "Downloading filings...", "Packaging files...", "Almost there..."];

      var progressInterval = setInterval(function () {
        var step = pct < 40 ? 2 : pct < 70 ? 1 : pct < 88 ? 0.4 : 0;
        pct = Math.min(pct + step, 90);
        bar.style.width = pct + "%";
        statusMsg.textContent = messages[Math.min(Math.floor(pct / 25), messages.length - 1)];
      }, 500);

      function poll() {
        fetch("/status/{{ job_id }}")
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.status === "done") {
              clearInterval(progressInterval);
              bar.style.width = "100%";
              setTimeout(function () {
                document.getElementById("progressSection").style.display = "none";
                document.getElementById("doneSection").style.display = "block";
              }, 400);
            } else if (data.status === "error") {
              clearInterval(progressInterval);
              statusMsg.textContent = "Something went wrong. Please go back and try again.";
              statusMsg.className = "error-msg";
            } else {
              setTimeout(poll, 3000);
            }
          })
          .catch(function () { setTimeout(poll, 5000); });
      }

      setTimeout(poll, 3000);
    </script>
  </body>
</html>
